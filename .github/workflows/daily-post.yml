name: Daily MapTap leaderboard

on:
  schedule:
    # 16:00 UTC = 12:00 PM America/New_York during EDT.
    # 17:00 UTC = 12:00 PM America/New_York during EST.
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  post-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run leaderboard script
        env:
          GROUPME_ACCESS_TOKEN: ${{ secrets.GROUPME_ACCESS_TOKEN }}
          GROUPME_GROUP_ID: ${{ secrets.GROUPME_GROUP_ID }}
          GROUPME_BOT_ID: ${{ secrets.GROUPME_BOT_ID }}
          MAPTAP_START_DATE: ${{ secrets.MAPTAP_START_DATE }}
          TIMEZONE: America/New_York
          POST_TITLE: MapTap All-Time Average
          POST_FOOTER: I seriously hope nobody does the stats on our performances
        run: node src/index.js
