name: Daily MapTap Post

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'

jobs:
  post-daily-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily post endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          DAILY_JOB_SECRET: ${{ secrets.DAILY_JOB_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$APP_BASE_URL/jobs/daily-post" \
            -H "x-job-secret: $DAILY_JOB_SECRET"
